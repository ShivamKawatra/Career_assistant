<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — NotesApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-body">

  <nav class="navbar">
    <a href="/" class="nav-logo">📝 NotesApp</a>
    <div class="nav-links" id="navLinks">
      <a href="/login.html" class="nav-link active">🔑 Login</a>
      <a href="/signup.html" class="nav-link">✨ Sign Up</a>
    </div>
  </nav>

  <script>
    fetch('/api/me').then(r => r.ok ? r.json() : null).then(user => {
      if (!user) return;
      window.location.replace('/dashboard');
    });
  </script>

  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-icon">🔐</div>
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to access your notes</p>

      <form id="loginForm" novalidate>
        <div class="form-group">
          <label>Email address</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
          <span class="field-error" id="emailErr"></span>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
            <button type="button" class="eye-btn" id="togglePwd">👁</button>
          </div>
          <span class="field-error" id="passwordErr"></span>
        </div>
        <div class="form-error" id="formErr"></div>
        <button type="submit" class="btn-auth" id="submitBtn">Sign In</button>
      </form>

      <p class="auth-switch">Don't have an account? <a href="/signup.html">Create one</a></p>
    </div>
  </main>

  <footer class="footer">
    <span>© 2025 NotesApp — Secure note management</span>
    <a href="/login.html" class="footer-home">🏠 Home</a>
  </footer>

  <script>
    const form = document.getElementById('loginForm');
    const emailEl = document.getElementById('email');
    const pwdEl = document.getElementById('password');

    document.getElementById('togglePwd').addEventListener('click', () => {
      pwdEl.type = pwdEl.type === 'password' ? 'text' : 'password';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('emailErr').textContent = '';
      document.getElementById('passwordErr').textContent = '';
      document.getElementById('formErr').textContent = '';

      let valid = true;
      if (!emailEl.value.trim()) {
        document.getElementById('emailErr').textContent = 'Email is required.';
        valid = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value.trim())) {
        document.getElementById('emailErr').textContent = 'Enter a valid email.';
        valid = false;
      }
      if (!pwdEl.value) {
        document.getElementById('passwordErr').textContent = 'Password is required.';
        valid = false;
      }
      if (!valid) return;

      const btn = document.getElementById('submitBtn');
      btn.textContent = 'Signing in…'; btn.disabled = true;

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: emailEl.value.trim(), password: pwdEl.value })
      });
      const data = await res.json();

      if (!res.ok) {
        document.getElementById('formErr').textContent = data.error;
        btn.textContent = 'Sign In'; btn.disabled = false;
        return;
      }
      window.location.href = '/dashboard';
    });
  </script>
</body>
</html>
