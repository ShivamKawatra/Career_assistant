<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up — NotesApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="auth-body">

  <nav class="navbar">
    <a href="/" class="nav-logo">📝 NotesApp</a>
    <div class="nav-links" id="navLinks">
      <a href="/login.html" class="nav-link">🔑 Login</a>
      <a href="/signup.html" class="nav-link active">✨ Sign Up</a>
    </div>
  </nav>

  <script>
    fetch('/api/me').then(r => r.ok ? r.json() : null).then(user => {
      if (!user) return;
      window.location.replace('/dashboard');
    });
  </script>

  <main class="auth-main">
    <div class="auth-card">
      <div class="auth-icon">✨</div>
      <h1 class="auth-title">Create account</h1>
      <p class="auth-subtitle">Start organizing your notes today</p>

      <form id="signupForm" novalidate>
        <div class="form-group">
          <label>Full name</label>
          <input type="text" id="name" placeholder="John Doe" autocomplete="name"/>
          <span class="field-error" id="nameErr"></span>
        </div>
        <div class="form-group">
          <label>Email address</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
          <span class="field-error" id="emailErr"></span>
        </div>
        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="Min 8 chars, 1 uppercase, 1 number" autocomplete="new-password"/>
            <button type="button" class="eye-btn" id="togglePwd">👁</button>
          </div>
          <span class="field-error" id="passwordErr"></span>
          <div class="pwd-rules" id="pwdRules">
            <span id="r-len">✗ At least 8 characters</span>
            <span id="r-upper">✗ One uppercase letter</span>
            <span id="r-num">✗ One number</span>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm password</label>
          <div class="input-wrap">
            <input type="password" id="confirm" placeholder="Re-enter your password" autocomplete="new-password"/>
            <button type="button" class="eye-btn" id="toggleConfirm">👁</button>
          </div>
          <span class="field-error" id="confirmErr"></span>
        </div>
        <div class="form-error" id="formErr"></div>
        <button type="submit" class="btn-auth" id="submitBtn">Create Account</button>
      </form>

      <p class="auth-switch">Already have an account? <a href="/login.html">Sign in</a></p>
    </div>
  </main>

  <footer class="footer">
    <span>© 2025 NotesApp — Secure note management</span>
    <a href="/login.html" class="footer-home">🏠 Home</a>
  </footer>

  <script>
    const pwdEl = document.getElementById('password');
    const confirmEl = document.getElementById('confirm');

    document.getElementById('togglePwd').addEventListener('click', () => {
      pwdEl.type = pwdEl.type === 'password' ? 'text' : 'password';
    });
    document.getElementById('toggleConfirm').addEventListener('click', () => {
      confirmEl.type = confirmEl.type === 'password' ? 'text' : 'password';
    });

    // Live password rules feedback
    pwdEl.addEventListener('input', () => {
      const v = pwdEl.value;
      setRule('r-len',   v.length >= 8);
      setRule('r-upper', /[A-Z]/.test(v));
      setRule('r-num',   /[0-9]/.test(v));
    });

    function setRule(id, pass) {
      const el = document.getElementById(id);
      el.textContent = (pass ? '✓ ' : '✗ ') + el.textContent.slice(2);
      el.style.color = pass ? '#4ade80' : '#94a3b8';
    }

    function validatePassword(p) {
      if (p.length < 8) return 'Password must be at least 8 characters.';
      if (!/[A-Z]/.test(p)) return 'Password must contain at least one uppercase letter.';
      if (!/[0-9]/.test(p)) return 'Password must contain at least one number.';
      return null;
    }

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      ['nameErr','emailErr','passwordErr','confirmErr','formErr'].forEach(id => {
        document.getElementById(id).textContent = '';
      });

      const name  = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const pwd   = pwdEl.value;
      const conf  = confirmEl.value;
      let valid = true;

      if (!name) { document.getElementById('nameErr').textContent = 'Name is required.'; valid = false; }
      if (!email) {
        document.getElementById('emailErr').textContent = 'Email is required.'; valid = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        document.getElementById('emailErr').textContent = 'Enter a valid email.'; valid = false;
      }
      const pwdError = validatePassword(pwd);
      if (pwdError) { document.getElementById('passwordErr').textContent = pwdError; valid = false; }
      if (pwd !== conf) { document.getElementById('confirmErr').textContent = 'Passwords do not match.'; valid = false; }
      if (!valid) return;

      const btn = document.getElementById('submitBtn');
      btn.textContent = 'Creating account…'; btn.disabled = true;

      const res = await fetch('/api/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password: pwd })
      });
      const data = await res.json();

      if (!res.ok) {
        document.getElementById('formErr').textContent = data.error;
        btn.textContent = 'Create Account'; btn.disabled = false;
        return;
      }
      window.location.href = '/dashboard';
    });
  </script>
</body>
</html>
