<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile — NotesApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { overflow: auto; height: auto; min-height: 100vh; }
    .profile-main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px 60px;
      gap: 24px;
    }
    .profile-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 40px;
      width: 100%;
      max-width: 520px;
    }
    .profile-avatar {
      width: 72px; height: 72px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #c084fc);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; font-weight: 800; color: #fff;
      margin-bottom: 20px;
    }
    .profile-name {
      font-size: 1.5rem; font-weight: 800;
      color: var(--text-1); letter-spacing: -0.02em;
      margin-bottom: 4px;
    }
    .profile-email {
      font-size: 0.88rem; color: var(--text-2); margin-bottom: 24px;
    }
    .profile-meta {
      display: flex; gap: 24px; flex-wrap: wrap;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .meta-item { display: flex; flex-direction: column; gap: 3px; }
    .meta-label { font-size: 0.7rem; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.07em; }
    .meta-value { font-size: 1rem; font-weight: 700; color: var(--text-1); }

    .stats-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 40px;
      width: 100%;
      max-width: 520px;
    }
    .stats-title {
      font-size: 0.72rem; font-weight: 600; color: var(--text-3);
      text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 18px;
    }
    .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 24px; }
    .stat-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      text-align: center;
    }
    .stat-num { font-size: 1.6rem; font-weight: 800; color: var(--accent); }
    .stat-lbl { font-size: 0.72rem; font-weight: 500; color: var(--text-3); margin-top: 2px; }

    .cat-list { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
    .cat-chip {
      display: flex; align-items: center; gap: 6px;
      background: rgba(99,102,241,0.12);
      border: 1px solid rgba(99,102,241,0.2);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.78rem; font-weight: 600; color: var(--accent);
    }
    .cat-chip span { color: var(--text-2); font-weight: 400; }

    .recent-list { display: flex; flex-direction: column; gap: 8px; }
    .recent-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.84rem;
    }
    .recent-title { font-weight: 600; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }
    .recent-date { font-size: 0.72rem; color: var(--text-3); flex-shrink: 0; }

    .profile-actions { display: flex; gap: 10px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
    .section-divider { font-size: 0.72rem; font-weight: 600; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 12px; }
  </style>
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-logo">📝 NotesApp</a>
    <div class="nav-links">
      <a href="/dashboard" class="nav-link">📝 My Notes</a>
      <a href="/profile.html" class="nav-link active">👤 Profile</a>
      <span class="nav-user" id="navUser"></span>
      <button class="nav-link nav-logout" id="logoutBtn">🚪 Logout</button>
    </div>
  </nav>

  <main class="profile-main">
    <!-- Profile Card -->
    <div class="profile-card">
      <div class="profile-avatar" id="avatarInitial">?</div>
      <div class="profile-name" id="profileName">Loading…</div>
      <div class="profile-email" id="profileEmail"></div>
      <div class="profile-meta">
        <div class="meta-item">
          <span class="meta-label">Member since</span>
          <span class="meta-value" id="memberSince">—</span>
        </div>
        <div class="meta-item">
          <span class="meta-label">Account ID</span>
          <span class="meta-value" id="accountId">—</span>
        </div>
      </div>
      <div class="profile-actions">
        <button class="btn-danger" id="logoutBtn2">🚪 Sign Out</button>
      </div>
    </div>

    <!-- Stats Card -->
    <div class="stats-card">
      <div class="stats-title">Your Notes Overview</div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-num" id="totalNotes">—</div>
          <div class="stat-lbl">Total Notes</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="totalCats">—</div>
          <div class="stat-lbl">Categories</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="topCat">—</div>
          <div class="stat-lbl">Top Category</div>
        </div>
      </div>

      <div class="section-divider">Categories</div>
      <div class="cat-list" id="catList"></div>

      <div class="section-divider">Recent Activity</div>
      <div class="recent-list" id="recentList"></div>
    </div>
  </main>

  <footer class="footer">
    <span>© 2025 NotesApp — Built with Node.js, Express &amp; SQLite</span>
    <a href="/dashboard" class="footer-home">📝 My Notes</a>
  </footer>

  <script>
    function fmtDate(dt) {
      return new Date(dt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    async function init() {
      const meRes = await fetch('/api/me');
      if (!meRes.ok) { window.location.replace('/login.html'); return; }
      const user = await meRes.json();

      document.getElementById('navUser').textContent = `👤 ${user.name}`;
      document.getElementById('profileName').textContent = user.name;
      document.getElementById('profileEmail').textContent = user.email || '';
      document.getElementById('avatarInitial').textContent = user.name.charAt(0).toUpperCase();
      document.getElementById('memberSince').textContent = user.created_at ? fmtDate(user.created_at) : '—';
      document.getElementById('accountId').textContent = `#${user.id}`;

      const statsRes = await fetch('/api/me/stats');
      const stats = await statsRes.json();

      document.getElementById('totalNotes').textContent = stats.total;
      document.getElementById('totalCats').textContent = stats.categories.length;
      document.getElementById('topCat').textContent = stats.categories[0]?.category || '—';

      const catList = document.getElementById('catList');
      if (stats.categories.length === 0) {
        catList.innerHTML = '<span style="color:var(--text-3);font-size:0.82rem">No notes yet</span>';
      } else {
        stats.categories.forEach(c => {
          catList.innerHTML += `<div class="cat-chip">${c.category} <span>${c.c} note${c.c !== 1 ? 's' : ''}</span></div>`;
        });
      }

      const recentList = document.getElementById('recentList');
      if (stats.recent.length === 0) {
        recentList.innerHTML = '<span style="color:var(--text-3);font-size:0.82rem">No recent activity</span>';
      } else {
        stats.recent.forEach(n => {
          recentList.innerHTML += `
            <div class="recent-item">
              <span class="recent-title">${n.title}</span>
              <span class="recent-date">${fmtDate(n.updated_at)}</span>
            </div>`;
        });
      }
    }

    async function logout() {
      await fetch('/api/logout', { method: 'POST' });
      window.location.replace('/login.html');
    }

    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('logoutBtn2').addEventListener('click', logout);

    init();
  </script>
</body>
</html>
